version: '3.9'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=LaMeg@Password123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    expose:
      - "1433"
  angular:
    build:
      context: ./dashboard-app
      dockerfile: ../docker/angular/Dockerfile
    container_name: angular-app
    expose:
      - "80"

  dotnet:
    build:
      context: .
      dockerfile: docker/dotnet/Dockerfile
    container_name: dotnet-api
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=AuthDB;User Id=sa;Password=LaMeg@Password123!;TrustServerCertificate=True;
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: nginx-test
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - angular
      - dotnet
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
volumes:
  sql_data: