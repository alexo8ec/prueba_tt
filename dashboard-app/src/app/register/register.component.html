<div class="register-container">
  <form (ngSubmit)="register()" class="register-form">
    <h2>Registro</h2>
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input id="nombre" name="nombre" [(ngModel)]="nombre" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="apellido" class="form-label">Apellido</label>
      <input id="apellido" name="apellido" [(ngModel)]="apellido" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="telefono" class="form-label">Teléfono</label>
      <input id="telefono" name="telefono" [(ngModel)]="telefono" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="direccion" class="form-label">Dirección</label>
      <input id="direccion" name="direccion" [(ngModel)]="direccion" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="email" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <input id="password" name="password" type="password" [(ngModel)]="password" class="form-control" required />
    </div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <button type="submit" class="btn btn-primary w-100 mb-2" [disabled]="loading">Registrarse</button>
    <button type="button" class="btn btn-link w-100" (click)="cancel.emit()">Volver al login</button>
  </form>
</div>
